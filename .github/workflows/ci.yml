name: CI

# Validates pull requests and pushes to main (tests + compile).
# Does NOT publish Docker images — see publish.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    env:
      # Prisma CLI requires DATABASE_URL at parse time; no DB connection is made in CI.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/signbank_ci?schema=public
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test -- --ci --passWithNoTests

      - name: Compile
        run: npx nest build

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_BASE_URL: ${{ vars.BASE_URL || 'localhost' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quasar CLI
        run: npm install -g @quasar/cli

      - name: Install dependencies
        run: npm install

      - name: Build SPA
        run: |
          echo "VITE_BASE_URL=${VITE_BASE_URL}" > .env
          npx quasar build
